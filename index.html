<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1>🧮 Calculadora Básica</h1>

        <p class="descricao">
            Informe dois números para realizar as quatro operações matemáticas básicas.
        </p>

        <input
            type="number"
            id="numero1"
            placeholder="Primeiro número"
        >

        <input
            type="number"
            id="numero2"
            placeholder="Segundo número"
        >

        <button id="calcular">
            Calcular
        </button>

        <div id="resultado"></div>

        <footer>
            Desenvolvido por Lucas André Félix Moreira
        </footer>

    </main>

    <script src="script.js"></script>

</body>
</html>
